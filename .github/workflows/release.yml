name: Release

on:
  push:
    tags:
      # Canonical crate version tags ONLY — semver `vMAJOR.MINOR.PATCH`.
      # A bare `v*` also matches `vscode-v*` (release-vscode.yml), which would
      # fire the full crates.io publish + binary release on a VS Code tag and
      # race that workflow. This pattern requires a digit right after `v`, so it
      # is disjoint from `vscode-v*` and `npm-v*` (red-team A6).
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Gate: ensure tests pass before building release artifacts
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        uses: ./.github/actions/linux-deps

      # Action code pinned to a SHA (no semver tags exist on this repo); the Rust
      # channel stays dynamic via `toolchain: stable` so we still get latest stable.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026-06)
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install bridge test dependencies
        working-directory: crates/victauri-plugin/tests/bridge_tests
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────────────
  # Build release binaries for all platforms
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.binary }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # victauri-cli (binary: victauri)
          - binary: victauri-cli
            bin-name: victauri
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset-name: victauri-cli-linux-x86_64
            use-cross: false
          - binary: victauri-cli
            bin-name: victauri
            target: x86_64-pc-windows-msvc
            os: windows-latest
            asset-name: victauri-cli-windows-x86_64.exe
            use-cross: false
          - binary: victauri-cli
            bin-name: victauri
            target: x86_64-apple-darwin
            os: macos-latest
            asset-name: victauri-cli-macos-x86_64
            use-cross: false
          - binary: victauri-cli
            bin-name: victauri
            target: aarch64-apple-darwin
            os: macos-latest
            asset-name: victauri-cli-macos-aarch64
            use-cross: false

          # victauri-browser (binary: victauri-browser-host)
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset-name: victauri-browser-host-linux-x86_64
            use-cross: false
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: x86_64-pc-windows-msvc
            os: windows-latest
            asset-name: victauri-browser-host-windows-x86_64.exe
            use-cross: false
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: x86_64-apple-darwin
            os: macos-latest
            asset-name: victauri-browser-host-macos-x86_64
            use-cross: false
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: aarch64-apple-darwin
            os: macos-latest
            asset-name: victauri-browser-host-macos-aarch64
            use-cross: false

          # victauri-watchdog (binary: victauri-watchdog)
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset-name: victauri-watchdog-linux-x86_64
            use-cross: false
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: x86_64-pc-windows-msvc
            os: windows-latest
            asset-name: victauri-watchdog-windows-x86_64.exe
            use-cross: false
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: x86_64-apple-darwin
            os: macos-latest
            asset-name: victauri-watchdog-macos-x86_64
            use-cross: false
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: aarch64-apple-darwin
            os: macos-latest
            asset-name: victauri-watchdog-macos-aarch64
            use-cross: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/linux-deps

      # Action code pinned to a SHA (no semver tags exist on this repo); the Rust
      # channel stays dynamic via `toolchain: stable` so we still get latest stable.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026-06)
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.binary }}

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} -p ${{ matrix.binary }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.bin-name }} ${{ matrix.asset-name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin-name }}.exe" "${{ matrix.asset-name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.asset-name }}
          path: ${{ matrix.asset-name }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Package Chrome extension
  # ─────────────────────────────────────────────────────────────────────
  chrome-extension:
    name: Package Chrome Extension
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create extension zip
        run: |
          cd extensions/chrome
          zip -r ../../victauri-chrome-extension.zip . \
            -x "tests/*" \
            -x "node_modules/*"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: victauri-chrome-extension
          path: victauri-chrome-extension.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Require the FULL CI (all platforms + real-app E2E) to have passed for this
  # exact commit before publishing. The `test` gate above only runs on ubuntu, so
  # a bug that fails only on macOS or in the real-app E2E (both happened in 0.7.4)
  # would otherwise publish anyway. CI is the single source of truth; a tag must
  # point at a CI-green commit, and publish is blocked until it is proven green.
  # ─────────────────────────────────────────────────────────────────────
  require-ci-green:
    name: Require CI green for this commit
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for and require CI success for ${{ github.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          repo="${{ github.repository }}"
          echo "Requiring the CI workflow (ci.yml) to be green for $sha before publishing."
          for i in $(seq 1 80); do
            run=$(gh api "repos/$repo/actions/workflows/ci.yml/runs?head_sha=$sha&per_page=1" \
                    --jq '.workflow_runs[0] | "\(.status)|\(.conclusion)"' 2>/dev/null || echo "none|")
            status="${run%%|*}"
            concl="${run##*|}"
            echo "  attempt $i/80: ci status=$status conclusion=$concl"
            if [ "$status" = "completed" ]; then
              if [ "$concl" = "success" ]; then
                echo "✅ CI is green for $sha — publish may proceed."
                exit 0
              fi
              echo "::error::CI concluded '$concl' for $sha. Refusing to publish a commit that is not CI-green."
              exit 1
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for CI to complete on $sha. Refusing to publish (no proven-green CI run)."
          exit 1

  # ─────────────────────────────────────────────────────────────────────
  # Publish crates to crates.io
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Crates cannot be unpublished. Require the release-profile binaries and
    # packaged extension to exist before making the version irreversible.
    needs: [test, build, chrome-extension, require-ci-green]
    # Least privilege for the job that holds the crates.io token (audit #8).
    permissions:
      contents: read
    # Gate behind a protected Environment. Add required reviewers in
    # repo Settings → Environments → release to require approval before publish.
    environment: release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Assert tag matches workspace version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          # Anchor on `version =` (the [workspace.package] key) so we can't match a
          # stray `version-*` key; bail loudly if the parse comes back empty.
          VER="$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$VER" ]; then
            echo "::error::could not parse workspace version from Cargo.toml"
            exit 1
          fi
          if [ "$TAG" != "$VER" ]; then
            echo "::error::tag v$TAG does not match workspace version $VER"
            exit 1
          fi
          echo "tag matches workspace version: $VER"

      - name: Install system dependencies
        uses: ./.github/actions/linux-deps

      # Action code pinned to a SHA (no semver tags exist on this repo); the Rust
      # channel stays dynamic via `toolchain: stable` so we still get latest stable.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026-06)
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Publish crates in dependency order
        run: |
          publish() {
            echo "Publishing $1..."
            # NB: capture cargo's exit via PIPESTATUS, NOT the pipeline's (which is
            # tee's and is always 0) — otherwise an auth/publish failure is masked
            # and the job false-greens without anything reaching crates.io.
            cargo publish -p "$1" 2>&1 | tee /tmp/pub.log
            rc=${PIPESTATUS[0]}
            if [ "$rc" -eq 0 ]; then
              echo "$1 published successfully"
            elif grep -qiE "already exists|already uploaded|crate version .* is already" /tmp/pub.log; then
              echo "$1 already published, skipping"
            else
              echo "::error::Failed to publish $1 (cargo exit $rc)"
              exit 1
            fi
            sleep 30
          }
          publish victauri-core
          publish victauri-macros
          publish victauri-browser
          publish victauri-plugin
          publish victauri-test
          publish victauri-cli
          publish victauri-watchdog

  # ─────────────────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    # Depend on `publish` so a GitHub Release is never cut for a tag whose crates
    # failed to reach crates.io — the release would otherwise advertise a version
    # users cannot `cargo add` (red-team P2).
    needs: [build, chrome-extension, publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release — use all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$CURRENT_TAG")
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..${CURRENT_TAG}")
          fi

          # Write to file to handle multiline
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Move binaries (each is in its own directory named after the artifact)
          for dir in artifacts/victauri-cli-* artifacts/victauri-browser-host-* artifacts/victauri-watchdog-*; do
            if [ -d "$dir" ]; then
              cp "$dir"/* release-assets/
            fi
          done

          # Move Chrome extension zip
          cp artifacts/victauri-chrome-extension/victauri-chrome-extension.zip release-assets/

          # Make Unix binaries executable
          chmod +x release-assets/victauri-cli-linux-x86_64 || true
          chmod +x release-assets/victauri-cli-macos-x86_64 || true
          chmod +x release-assets/victauri-cli-macos-aarch64 || true
          chmod +x release-assets/victauri-browser-host-linux-x86_64 || true
          chmod +x release-assets/victauri-browser-host-macos-x86_64 || true
          chmod +x release-assets/victauri-browser-host-macos-aarch64 || true
          chmod +x release-assets/victauri-watchdog-linux-x86_64 || true
          chmod +x release-assets/victauri-watchdog-macos-x86_64 || true
          chmod +x release-assets/victauri-watchdog-macos-aarch64 || true

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/changelog.txt
          files: release-assets/*
          fail_on_unmatched_files: true
