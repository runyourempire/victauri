name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1e2a03c1345 # stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Dry-run victauri-core
        run: cargo publish -p victauri-core --dry-run

      # Dependent crates skip dry-run: they depend on victauri-core which
      # isn't on crates.io yet at this point.  cargo publish --dry-run
      # resolves deps from the registry even with --no-verify, so these
      # would always fail on a new minor/major version bump.  The real
      # publish step handles ordering with inter-crate sleep delays.

  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1e2a03c1345 # stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install bridge test dependencies
        working-directory: crates/victauri-plugin/tests/bridge_tests
        run: npm install

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [dry-run, test]
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1e2a03c1345 # stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Publish victauri-core
        run: cargo publish -p victauri-core

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-macros
        run: cargo publish -p victauri-macros

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-plugin
        run: cargo publish -p victauri-plugin

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-test
        run: cargo publish -p victauri-test

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-cli
        run: cargo publish -p victauri-cli

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-watchdog
        run: cargo publish -p victauri-watchdog

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
