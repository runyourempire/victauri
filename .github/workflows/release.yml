name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Gate: ensure tests pass before building release artifacts
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install bridge test dependencies
        working-directory: crates/victauri-plugin/tests/bridge_tests
        run: npm install

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────────────
  # Build release binaries for all platforms
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.binary }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # victauri-cli (binary: victauri)
          - binary: victauri-cli
            bin-name: victauri
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset-name: victauri-cli-linux-x86_64
            use-cross: false
          - binary: victauri-cli
            bin-name: victauri
            target: x86_64-pc-windows-msvc
            os: windows-latest
            asset-name: victauri-cli-windows-x86_64.exe
            use-cross: false
          - binary: victauri-cli
            bin-name: victauri
            target: x86_64-apple-darwin
            os: macos-latest
            asset-name: victauri-cli-macos-x86_64
            use-cross: false
          - binary: victauri-cli
            bin-name: victauri
            target: aarch64-apple-darwin
            os: macos-latest
            asset-name: victauri-cli-macos-aarch64
            use-cross: false

          # victauri-browser (binary: victauri-browser-host)
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset-name: victauri-browser-host-linux-x86_64
            use-cross: false
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: x86_64-pc-windows-msvc
            os: windows-latest
            asset-name: victauri-browser-host-windows-x86_64.exe
            use-cross: false
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: x86_64-apple-darwin
            os: macos-latest
            asset-name: victauri-browser-host-macos-x86_64
            use-cross: false
          - binary: victauri-browser
            bin-name: victauri-browser-host
            target: aarch64-apple-darwin
            os: macos-latest
            asset-name: victauri-browser-host-macos-aarch64
            use-cross: false

          # victauri-watchdog (binary: victauri-watchdog)
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset-name: victauri-watchdog-linux-x86_64
            use-cross: false
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: x86_64-pc-windows-msvc
            os: windows-latest
            asset-name: victauri-watchdog-windows-x86_64.exe
            use-cross: false
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: x86_64-apple-darwin
            os: macos-latest
            asset-name: victauri-watchdog-macos-x86_64
            use-cross: false
          - binary: victauri-watchdog
            bin-name: victauri-watchdog
            target: aarch64-apple-darwin
            os: macos-latest
            asset-name: victauri-watchdog-macos-aarch64
            use-cross: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.binary }}

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} -p ${{ matrix.binary }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.bin-name }} ${{ matrix.asset-name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin-name }}.exe" "${{ matrix.asset-name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.asset-name }}
          path: ${{ matrix.asset-name }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Package Chrome extension
  # ─────────────────────────────────────────────────────────────────────
  chrome-extension:
    name: Package Chrome Extension
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create extension zip
        run: |
          cd extensions/chrome
          zip -r ../../victauri-chrome-extension.zip . \
            -x "tests/*" \
            -x "node_modules/*"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: victauri-chrome-extension
          path: victauri-chrome-extension.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Publish crates to crates.io
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Publish victauri-core
        run: cargo publish -p victauri-core

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-macros
        run: cargo publish -p victauri-macros

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-browser
        run: cargo publish -p victauri-browser

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-plugin
        run: cargo publish -p victauri-plugin

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-test
        run: cargo publish -p victauri-test

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-cli
        run: cargo publish -p victauri-cli

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-watchdog
        run: cargo publish -p victauri-watchdog

  # ─────────────────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, chrome-extension]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release — use all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$CURRENT_TAG")
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..${CURRENT_TAG}")
          fi

          # Write to file to handle multiline
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Move binaries (each is in its own directory named after the artifact)
          for dir in artifacts/victauri-cli-* artifacts/victauri-browser-host-* artifacts/victauri-watchdog-*; do
            if [ -d "$dir" ]; then
              cp "$dir"/* release-assets/
            fi
          done

          # Move Chrome extension zip
          cp artifacts/victauri-chrome-extension/victauri-chrome-extension.zip release-assets/

          # Make Unix binaries executable
          chmod +x release-assets/victauri-cli-linux-x86_64 || true
          chmod +x release-assets/victauri-cli-macos-x86_64 || true
          chmod +x release-assets/victauri-cli-macos-aarch64 || true
          chmod +x release-assets/victauri-browser-host-linux-x86_64 || true
          chmod +x release-assets/victauri-browser-host-macos-x86_64 || true
          chmod +x release-assets/victauri-browser-host-macos-aarch64 || true
          chmod +x release-assets/victauri-watchdog-linux-x86_64 || true
          chmod +x release-assets/victauri-watchdog-macos-x86_64 || true
          chmod +x release-assets/victauri-watchdog-macos-aarch64 || true

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/changelog.txt
          files: release-assets/*
          fail_on_unmatched_files: true
