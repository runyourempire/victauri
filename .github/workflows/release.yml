name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

      - name: Publish victauri-core
        run: cargo publish -p victauri-core --no-verify
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-macros
        run: cargo publish -p victauri-macros --no-verify
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-plugin
        run: cargo publish -p victauri-plugin --no-verify
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish victauri-watchdog
        run: cargo publish -p victauri-watchdog --no-verify
        continue-on-error: true

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
