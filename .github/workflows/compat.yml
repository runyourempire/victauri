name: Compatibility Retest

# Re-verify Victauri against real-world third-party Tauri apps using the CURRENT
# code in this repo (a path dependency, not a published version). The published
# "96.9% across 5 apps" numbers were measured on an older Victauri — this is the
# reproducible job that keeps them honest.
#
# Heavy (clones + full frontend + Tauri builds), so it is NOT part of CI: run it
# on demand or weekly. Each app is its own matrix leg so one app's build breakage
# doesn't hide the others.

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Single app key to test (blank = all)"
        required: false
        default: ""
  schedule:
    # Weekly, Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  retest:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with scripts/compat/apps.json (3 Tauri-2 apps). Surrealist was
        # dropped on the 2026-06-17 re-pin; Duckling was removed 2026-06-20 (its heavy WASM
        # editor never becomes responsive under headless software-GL WebKitGTK). See the
        # apps.json _comment for the exhaustive 4th-app search and per-candidate walls.
        # A matrix key not present in apps.json fails by construction.
        app: [kanri, en-croissant, lettura]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Skip non-selected apps (manual single-app runs)
        id: gate
        env:
          # Pass the dispatch input through env so Bash never interprets its
          # contents (avoids template-injection via the run script).
          WANT: ${{ github.event.inputs.app }}
          THIS_APP: ${{ matrix.app }}
        run: |
          if [ -n "$WANT" ] && [ "$WANT" != "$THIS_APP" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        if: steps.gate.outputs.run == 'true'
        uses: ./.github/actions/linux-deps
        with:
          xvfb: "true"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026-06)
        if: steps.gate.outputs.run == 'true'
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        if: steps.gate.outputs.run == 'true'
        with:
          key: compat-${{ matrix.app }}

      # The four apps use two JS package managers: yarn (Kanri) and pnpm (the rest).
      # corepack supplies both shims. (Bun was only needed for Surrealist, which was
      # dropped from apps.json on the 2026-06-17 re-pin.)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        if: steps.gate.outputs.run == 'true'
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 20

      - name: Enable corepack (yarn/pnpm shims)
        if: steps.gate.outputs.run == 'true'
        run: corepack enable || true

      - name: Retest ${{ matrix.app }} against current Victauri
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/compat/retest-app.sh "${{ matrix.app }}"

      - name: Upload result log
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: compat-${{ matrix.app }}
          # retest-app.sh writes app.log under $RUNNER_TEMP; glob only there. Globbing
          # `/tmp/**` previously failed with EACCES on the root-owned /tmp/snap-private-tmp,
          # turning every job red even when the smoke battery passed.
          path: |
            ${{ runner.temp }}/**/app.log
          if-no-files-found: ignore
