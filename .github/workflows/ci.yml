name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check & Lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install bridge test dependencies
        working-directory: crates/victauri-plugin/tests/bridge_tests
        run: npm install

      - name: Run tests
        run: cargo test --workspace

  e2e-real-app:
    name: Real-App E2E (demo-app, adversarial)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev xvfb

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      # Build the app and the test up front so the run step doesn't rebuild a
      # running binary. Debug build → the Victauri plugin is active.
      - name: Build demo-app + adversarial test
        run: |
          cargo build -p demo-app --bin demo-app
          cargo test -p demo-app --test adversarial --no-run

      - name: Run adversarial E2E against the live app
        run: |
          set -euo pipefail
          # Software rendering for headless WebKitGTK in CI.
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export LIBGL_ALWAYS_SOFTWARE=1

          # Launch the GUI app under a virtual display, in the background.
          xvfb-run -a --server-args="-screen 0 1280x800x24" \
            ./target/debug/demo-app > /tmp/demo-app.log 2>&1 &
          APP_PID=$!

          # Wait for the embedded MCP server, failing fast if the app exits.
          up=false
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:7373/health >/dev/null 2>&1; then
              echo "demo-app MCP server up after ${i}s"; up=true; break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::demo-app exited before the server came up"; cat /tmp/demo-app.log; exit 1
            fi
            sleep 1
          done
          if [ "$up" != true ]; then
            echo "::error::demo-app MCP server never became reachable"; cat /tmp/demo-app.log; kill "$APP_PID" || true; exit 1
          fi

          # Shared-app E2E tests must run sequentially (they mutate app state).
          set +e
          VICTAURI_E2E=1 cargo test -p demo-app --test adversarial -- --test-threads=1 --nocapture
          status=$?
          set -e

          kill "$APP_PID" 2>/dev/null || true
          if [ $status -ne 0 ]; then
            echo "=== demo-app log (last 100 lines) ==="; tail -100 /tmp/demo-app.log || true
          fi
          exit $status

      - name: Upload demo-app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-app-e2e-log
          path: /tmp/demo-app.log
          if-no-files-found: ignore

  # "Below the glass," proven on every desktop platform. On macOS no external tool can
  # even attach to the WKWebView (Tauri docs: tauri-driver is "only Windows and Linux
  # ... due to macOS not having a WKWebView driver tool available"), and WebDriver
  # everywhere is DOM-only (no Rust backend / IPC / DB). This matrix launches a real
  # Tauri app on macOS, Linux, and Windows and asserts the full stack live: webview +
  # DOM + IPC→Rust backend + command registry + native. Screenshot and trusted input
  # are intentionally excluded — they need display/Screen-Recording/Accessibility
  # grants headless CI cannot give; the same-process introspection that is the wedge
  # needs none of that.
  fullstack-proof:
    name: Full-Stack Proof (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev xvfb

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Build demo-app (debug → Victauri plugin active)
        run: cargo build -p demo-app --bin demo-app

      - name: Prove full-stack introspection live on ${{ matrix.os }}
        shell: bash
        run: |
          set -euo pipefail

          BIN=./target/debug/demo-app
          [ "$RUNNER_OS" = "Windows" ] && BIN=./target/debug/demo-app.exe

          # Launch the real Tauri app in the background (Linux needs a virtual display).
          case "$RUNNER_OS" in
            Linux)
              export WEBKIT_DISABLE_DMABUF_RENDERER=1 WEBKIT_DISABLE_COMPOSITING_MODE=1 LIBGL_ALWAYS_SOFTWARE=1
              xvfb-run -a --server-args="-screen 0 1280x800x24" "$BIN" > app.log 2>&1 &
              ;;
            *)
              "$BIN" > app.log 2>&1 &
              ;;
          esac
          APP_PID=$!

          up=false
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:7373/health >/dev/null 2>&1; then
              echo "MCP server up after ${i}s"; up=true; break
            fi
            kill -0 "$APP_PID" 2>/dev/null || { echo "::error::app exited before the server came up"; cat app.log; exit 1; }
            sleep 1
          done
          [ "$up" = true ] || { echo "::error::MCP server never became reachable"; cat app.log; kill "$APP_PID" 2>/dev/null || true; exit 1; }

          B=http://127.0.0.1:7373/api/tools
          fail() { echo "::error::$1"; echo '--- app.log ---'; cat app.log; kill "$APP_PID" 2>/dev/null || true; exit 1; }
          call() { curl -sf -X POST "$B/$1" -H 'content-type: application/json' --data-binary "$2"; }

          echo "================ FULL-STACK PROOF on $RUNNER_OS ================"

          # 1. WEBVIEW — eval JS inside the live webview
          ev=$(call eval_js '{"code":"return 6*7"}');                       echo "[1 webview ] eval 6*7      -> $ev"
          echo "$ev"  | grep -q '42'     || fail "eval_js"

          # 2. DOM — accessible snapshot with ref handles
          dom=$(call dom_snapshot '{}');                                    echo "[2 dom     ] snapshot bytes -> ${#dom}"
          echo "$dom" | grep -q 'ref'    || fail "dom_snapshot"

          # 3. IPC → RUST BACKEND — invoke a real command (WebDriver CANNOT do this)
          ipc=$(call invoke_command '{"command":"get_counter","args":{}}'); echo "[3 ipc->rust] get_counter  -> $ipc"
          echo "$ipc" | grep -q 'result' || fail "invoke_command (IPC→backend)"

          # 4. BACKEND — enumerate the registered command surface (no web API exists)
          reg=$(call get_registry '{}'); n=$(echo "$reg" | jq '.result | length'); echo "[4 backend ] registry      -> $n"
          [ "${n:-0}" -ge 1 ]           || fail "get_registry"

          # 5. NATIVE — same-process OS introspection
          mem=$(call get_memory_stats '{}');                                echo "[5 native  ] memory        -> $mem"
          echo "$mem" | grep -qiE 'bytes|resident|working_set' || fail "get_memory_stats"

          echo "PROVEN on $RUNNER_OS: webview + DOM + IPC→Rust backend + registry + native."
          echo "=============================================================="
          kill "$APP_PID" 2>/dev/null || true

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fullstack-proof-log-${{ matrix.os }}
          path: app.log
          if-no-files-found: ignore

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-Dwarnings"

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Check MSRV
        run: cargo check --workspace

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        run: cargo audit

  deny:
    name: Dependency Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install bridge test dependencies
        working-directory: crates/victauri-plugin/tests/bridge_tests
        run: npm install

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v4.7.1
        with:
          files: lcov.info

  semver:
    name: Semver Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check semver
        run: cargo semver-checks check-release --workspace

  chrome-extension-tests:
    name: Chrome Extension JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/chrome/tests/package-lock.json

      - name: Install dependencies
        working-directory: extensions/chrome/tests
        run: npm ci

      - name: Run tests
        working-directory: extensions/chrome/tests
        run: npx vitest run

  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev xvfb

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install bridge test dependencies
        working-directory: crates/victauri-plugin/tests/bridge_tests
        run: npm install

      - name: Build demo app
        run: cargo build -p demo-app

      - name: Start demo app (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a ./target/debug/demo-app &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      - name: Start demo app (macOS)
        if: runner.os == 'macOS'
        run: |
          ./target/debug/demo-app &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      - name: Start demo app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath .\target\debug\demo-app.exe -PassThru
          "APP_PID=$($proc.Id)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Victauri smoke tests
        uses: ./.github/actions/victauri-test
        with:
          check: "true"

      - name: Run E2E tests
        run: cargo test -p demo-app --test integration -- --test-threads=1
        env:
          VICTAURI_E2E: "1"

      - name: Cleanup (Unix)
        if: always() && runner.os != 'Windows'
        run: |
          if [ -n "$APP_PID" ]; then
            kill "$APP_PID" 2>/dev/null || true
          fi

      - name: Cleanup (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:APP_PID) {
            Stop-Process -Id $env:APP_PID -Force -ErrorAction SilentlyContinue
          }
