name: Release npm Package

# Decoupled from the core workspace release. Ships ONLY when you tag it:
#   git tag npm-v0.7.1 && git push origin npm-v0.7.1
# Or run manually with dry_run=true to pack + validate without publishing.
#
# Required secret:
#   NPM_TOKEN — npmjs.com automation token with publish rights for `victauri-browser`
on:
  push:
    tags: ["npm-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack + validate only (do not publish)"
        type: boolean
        default: true

# Least-privilege: default to read-only. The publish job needs no GitHub token
# scopes at all (it authenticates to npm via NODE_AUTH_TOKEN), so nothing is
# broadened here. The job-level block makes the read-only default explicit.
permissions:
  contents: read

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    defaults:
      run:
        working-directory: extensions/npm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#npm-v}"
          echo "package.json=$PKG_VERSION  tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag ($TAG_VERSION) does not match extensions/npm/package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Install + validate (pack)
        run: |
          npm ci --no-audit --no-fund
          npm pack --dry-run

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.dry_run == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
