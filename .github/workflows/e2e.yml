name: E2E Tests

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  e2e:
    name: E2E Integration Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev xvfb

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026-06)

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Build demo app
        run: cargo build -p demo-app

      - name: Start demo app (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum cargo run -p demo-app &
          sleep 10
        env:
          VICTAURI_PORT: "7374"

      - name: Start demo app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:VICTAURI_PORT = "7374"
          Start-Process -NoNewWindow cargo -ArgumentList "run","-p","demo-app"
          Start-Sleep -Seconds 10

      - name: Verify server is running
        run: curl -s http://127.0.0.1:7374/health
        shell: bash

      - name: Run E2E tests
        run: cargo test -p victauri-test --test e2e_demo_app -- --test-threads=1
        env:
          VICTAURI_E2E: "1"
          VICTAURI_PORT: "7374"

      - name: Run high-level API tests
        run: cargo test -p victauri-test --test high_level_api -- --test-threads=1
        env:
          VICTAURI_E2E: "1"
          VICTAURI_PORT: "7374"

      - name: Run verify builder tests
        run: cargo test -p victauri-test --test verify_builder -- --test-threads=1
        env:
          VICTAURI_E2E: "1"
          VICTAURI_PORT: "7374"
