name: Victauri Test
description: Run Victauri smoke tests and IPC coverage against a running Tauri app
author: 4DA Systems Pty Ltd

branding:
  icon: check-circle
  color: purple

inputs:
  port:
    description: Port where the Victauri server is running
    required: false
    default: "7373"
  max-load-ms:
    description: Maximum DOM complete time in milliseconds
    required: false
    default: "10000"
  max-heap-mb:
    description: Maximum JS heap usage in megabytes
    required: false
    default: "512"
  junit-path:
    description: Path to write JUnit XML report (enables test result upload)
    required: false
    default: ""
  coverage:
    description: Run IPC command coverage report after tests
    required: false
    default: "false"
  coverage-threshold:
    description: Minimum coverage percentage (fails if below)
    required: false
    default: ""
  victauri-version:
    description: Version of victauri-cli to install
    required: false
    default: "0.8.0"
  cli-source-path:
    description: >-
      Build & install victauri-cli from this local repo path instead of
      crates.io. Used by this repo's OWN CI so it validates the code being
      released (not the already-published crate). External consumers leave this
      empty to install the published crate.
    required: false
    default: ""
  health-timeout:
    description: Seconds to wait for the Victauri server to become healthy
    required: false
    default: "30"
  check:
    description: Run victauri check (diagnostics report) before tests
    required: false
    default: "false"

outputs:
  test-result:
    description: "pass or fail"
    value: ${{ steps.test.outcome == 'success' && 'pass' || 'fail' }}
  junit-report:
    description: Path to JUnit XML report (if generated)
    value: ${{ steps.test.outputs.junit-path }}
  server-port:
    description: Actual port the Victauri server is running on
    value: ${{ steps.health.outputs.port }}

runs:
  using: composite
  steps:
    - name: Install victauri-cli
      shell: bash
      env:
        CLI_SOURCE_PATH: ${{ inputs.cli-source-path }}
        VICTAURI_VERSION: ${{ inputs.victauri-version }}
      run: |
        if [ -n "$CLI_SOURCE_PATH" ]; then
          # Repo CI: validate the code being released, not the published crate.
          cargo install --path "$CLI_SOURCE_PATH" --locked --force
        elif [[ "$VICTAURI_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          cargo install "victauri-cli@$VICTAURI_VERSION" --locked
        else
          echo "::error::victauri-version must be an exact semver (for example, 0.7.10)"
          exit 1
        fi

    - name: Wait for Victauri server
      id: health
      shell: bash
      env:
        VICTAURI_PORT: ${{ inputs.port }}
        HEALTH_TIMEOUT: ${{ inputs.health-timeout }}
      run: |
        if ! [[ "$VICTAURI_PORT" =~ ^[0-9]+$ ]] || (( VICTAURI_PORT < 1 || VICTAURI_PORT > 65535 )); then
          echo "::error::port must be an integer between 1 and 65535"
          exit 1
        fi
        if ! [[ "$HEALTH_TIMEOUT" =~ ^[0-9]+$ ]]; then
          echo "::error::health-timeout must be a non-negative integer"
          exit 1
        fi

        elapsed=0
        echo "Waiting for Victauri server on port ${VICTAURI_PORT}..."
        until curl -sf "http://127.0.0.1:${VICTAURI_PORT}/health" > /dev/null 2>&1; do
          if [ "$elapsed" -ge "$HEALTH_TIMEOUT" ]; then
            echo "::error::Victauri server did not become healthy within ${HEALTH_TIMEOUT}s on port ${VICTAURI_PORT}"
            exit 1
          fi
          sleep 1
          elapsed=$((elapsed + 1))
        done
        echo "Server healthy after ${elapsed}s"
        echo "port=${VICTAURI_PORT}" >> "$GITHUB_OUTPUT"

    - name: Run diagnostics
      if: inputs.check == 'true'
      shell: bash
      env:
        VICTAURI_PORT: ${{ inputs.port }}
      run: victauri check

    - name: Run Victauri tests
      id: test
      shell: bash
      env:
        VICTAURI_PORT: ${{ inputs.port }}
        MAX_LOAD_MS: ${{ inputs.max-load-ms }}
        MAX_HEAP_MB: ${{ inputs.max-heap-mb }}
        JUNIT_PATH: ${{ inputs.junit-path }}
      run: |
        args=(--max-load-ms "$MAX_LOAD_MS" --max-heap-mb "$MAX_HEAP_MB")
        if [ -n "$JUNIT_PATH" ]; then
          if [[ "$JUNIT_PATH" == *$'\n'* || "$JUNIT_PATH" == *$'\r'* ]]; then
            echo "::error::junit-path must not contain newlines"
            exit 1
          fi
          args+=(--junit "$JUNIT_PATH")
          echo "junit-path=${JUNIT_PATH}" >> "$GITHUB_OUTPUT"
        fi
        victauri test "${args[@]}"

    - name: Run coverage report
      if: inputs.coverage == 'true'
      shell: bash
      env:
        VICTAURI_PORT: ${{ inputs.port }}
        COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
      run: |
        args=(--allow-empty-registry)
        if [ -n "$COVERAGE_THRESHOLD" ]; then
          args+=(--threshold "$COVERAGE_THRESHOLD")
        fi
        victauri coverage "${args[@]}"
