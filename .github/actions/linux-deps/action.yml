name: Linux build deps
description: >
  Install the GTK / WebKitGTK system libraries Tauri needs to build on Linux,
  plus (optionally) xvfb for headless GUI tests. Centralises the package list so
  every job stays in sync from one place.

inputs:
  xvfb:
    description: Also install xvfb (for launching the app headless)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Tauri system dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        pkgs="libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev"
        if [ "${{ inputs.xvfb }}" = "true" ]; then
          pkgs="$pkgs xvfb"
        fi
        # shellcheck disable=SC2086
        sudo apt-get install -y $pkgs
