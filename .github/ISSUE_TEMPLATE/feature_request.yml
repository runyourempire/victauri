name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas. Please describe your use case so we can understand the motivation.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that Victauri doesn't support well?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include tool names, parameters, or API examples if you have ideas.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - MCP Tools
        - Privacy / Security
        - Recording / Replay
        - DOM Inspection
        - Builder API
        - Documentation
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false
