name: Bug Report
description: Report a bug in Victauri
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below so we can reproduce and fix the issue.

  - type: input
    id: tauri-version
    attributes:
      label: Tauri Version
      description: Output of `cargo pkgid tauri` or your Cargo.toml version
      placeholder: "2.10.3"
    validations:
      required: true

  - type: input
    id: victauri-version
    attributes:
      label: Victauri Version
      description: Your victauri-plugin version from Cargo.toml
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any error messages, MCP responses, or stack traces.
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Plugin configuration
      description: Your VictauriBuilder setup (port, auth, privacy, etc.)
      render: rust
    validations:
      required: false
